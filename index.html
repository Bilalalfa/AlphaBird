<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alpha Flap - Flappy Bird Cyberpunk Clone</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #06050d;
            --primary: #ff0055;
            --secondary: #00ffcc;
            --accent: #8b5cf6;
            --card-bg: rgba(14, 11, 33, 0.75);
            --border-glow: rgba(139, 92, 246, 0.3);
            --font-main: 'Outfit', sans-serif;
            --font-game: 'Press Start 2P', monospace;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.18) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 85, 0.18) 0%, transparent 40%),
                radial-gradient(circle at center, #120e2a 0%, #050409 100%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 12px;
        }

        /* Ambient scanline and CRT effect for retro arcade feel */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            opacity: 0.45;
        }
        
        /* Arcade Container - Glassmorphic design */
        .arcade-container {
            position: relative;
            background: var(--card-bg);
            border-radius: 24px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.8),
                0 0 50px var(--border-glow),
                inset 0 0 20px rgba(255, 255, 255, 0.03);
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 432px;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: containerGlow 4s infinite alternate;
        }
        
        @keyframes containerGlow {
            0% {
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 35px rgba(139, 92, 246, 0.15), inset 0 0 20px rgba(255, 255, 255, 0.03);
                border-color: rgba(255, 255, 255, 0.06);
            }
            100% {
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 50px rgba(255, 0, 85, 0.2), inset 0 0 20px rgba(255, 255, 255, 0.03);
                border-color: rgba(255, 0, 85, 0.15);
            }
        }
        
        /* Header Title & Sound Control */
        .arcade-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 4px;
        }
        
        .arcade-title {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, #ff0055, #ff00ff, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .arcade-title i {
            color: var(--primary);
            font-size: 0.95rem;
            animation: pulseIcon 1.5s infinite alternate;
        }
        
        @keyframes pulseIcon {
            0% { transform: scale(1) rotate(0deg); text-shadow: 0 0 5px var(--primary); }
            100% { transform: scale(1.15) rotate(15deg); text-shadow: 0 0 15px var(--primary); }
        }

        .sound-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            width: 34px;
            height: 34px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .sound-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--secondary);
            color: var(--secondary);
            box-shadow: 0 0 12px rgba(0, 255, 204, 0.25);
            transform: scale(1.05);
        }
        
        /* Canvas Viewport frame */
        .canvas-wrapper {
            position: relative;
            width: 400px;
            height: 600px;
            border-radius: 14px;
            overflow: hidden;
            border: 3px solid #1c183a;
            box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.9);
            background-color: #0b0919;
            max-width: 100%;
            aspect-ratio: 400 / 600;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* HTML UI Overlays */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        
        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }
        
        /* Start Screen styling */
        .start-screen {
            background: radial-gradient(circle at center, rgba(17, 13, 44, 0.9) 0%, rgba(6, 5, 14, 0.97) 100%);
        }
        
        .logo-container {
            text-align: center;
            margin-bottom: 35px;
            animation: bounceLogo 3s infinite ease-in-out;
        }

        @keyframes bounceLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .logo-title {
            font-family: var(--font-game);
            font-size: 2.1rem;
            line-height: 1.25;
            color: #ffffff;
            text-shadow: 
                0 0 10px var(--primary),
                0 0 20px var(--primary),
                0 0 35px var(--accent);
            letter-spacing: -2px;
            margin-bottom: 10px;
            animation: textFlicker 3s infinite alternate;
        }

        @keyframes textFlicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 
                    0 0 8px var(--primary),
                    0 0 16px var(--primary),
                    0 0 30px var(--accent);
                opacity: 1;
            }
            20%, 24%, 55% {
                text-shadow: none;
                opacity: 0.8;
            }
        }
        
        .logo-subtitle {
            font-size: 0.8rem;
            color: var(--secondary);
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.35);
        }
        
        .instruction-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 18px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: inset 0 0 12px rgba(255, 255, 255, 0.01);
            width: 100%;
            max-width: 290px;
        }
        
        .tap-prompt {
            font-family: var(--font-game);
            font-size: 0.55rem;
            color: #ffffff;
            line-height: 1.8;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            animation: pulseText 1.4s infinite alternate;
        }

        @keyframes pulseText {
            0% { opacity: 0.35; transform: scale(0.97); }
            100% { opacity: 1; transform: scale(1.03); }
        }
        
        .control-badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }

        .control-badge {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.72rem;
            font-weight: 600;
            color: #eeeeee;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .control-badge i {
            font-size: 0.75rem;
            color: var(--secondary);
        }
        
        .high-score-banner {
            font-size: 0.9rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .high-score-banner span {
            color: var(--secondary);
            font-weight: 800;
            text-shadow: 0 0 6px rgba(0, 255, 204, 0.4);
        }
        
        /* Game Over screen styling */
        .game-over-screen {
            background: rgba(8, 6, 20, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .game-over-card {
            background: linear-gradient(135deg, rgba(24, 18, 51, 0.9) 0%, rgba(10, 8, 23, 0.96) 100%);
            border: 2px solid rgba(255, 0, 85, 0.25);
            border-radius: 22px;
            padding: 24px;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 35px rgba(255, 0, 85, 0.15);
            text-align: center;
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .game-over-screen:not(.hidden) .game-over-card {
            transform: scale(1);
            opacity: 1;
        }
        
        .game-over-title {
            font-family: var(--font-game);
            font-size: 1.3rem;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.4);
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }
        
        /* Score Statistics panel */
        .score-board {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }
        
        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .score-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.55);
            font-weight: 600;
        }
        
        .score-val {
            font-family: var(--font-game);
            font-size: 1rem;
            color: #ffffff;
        }
        
        .score-val.highlight {
            color: var(--secondary);
            text-shadow: 0 0 6px rgba(0, 255, 204, 0.4);
        }
        
        /* Medals System */
        .medal-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 12px;
            margin-top: 4px;
            width: 100%;
        }

        .medal-badge-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .medal-badge-name {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.8);
        }

        .medal-img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.15);
        }

        /* Medal colors and glow designs */
        .medal-platinum { 
            background: linear-gradient(135deg, #e5e9f0, #adb5bd); 
            color: #ffffff; 
            box-shadow: 0 0 12px rgba(255,255,255,0.4); 
            border-color: #ffffff;
        }
        .medal-gold { 
            background: linear-gradient(135deg, #ffe066, #f59f00); 
            color: #ffffff; 
            box-shadow: 0 0 12px rgba(245, 159, 0, 0.5); 
            border-color: #ffe066;
        }
        .medal-silver { 
            background: linear-gradient(135deg, #dee2e6, #868e96); 
            color: #ffffff; 
            box-shadow: 0 0 10px rgba(173, 181, 189, 0.4); 
            border-color: #dee2e6;
        }
        .medal-bronze { 
            background: linear-gradient(135deg, #f76707, #d9480f); 
            color: #ffffff; 
            box-shadow: 0 0 10px rgba(247, 103, 7, 0.4); 
            border-color: #f76707;
        }
        .medal-none { 
            background: rgba(255,255,255,0.04); 
            color: rgba(255,255,255,0.15); 
            box-shadow: none;
            border-color: rgba(255, 255, 255, 0.05);
        }
        
        .new-record-badge {
            position: absolute;
            top: -12px;
            right: 16px;
            background: var(--primary);
            color: #ffffff;
            font-size: 0.62rem;
            font-weight: 800;
            padding: 5px 9px;
            border-radius: 6px;
            text-transform: uppercase;
            box-shadow: 0 0 12px var(--primary);
            animation: bounceRecord 1s infinite ease-in-out;
            display: none;
            letter-spacing: 0.5px;
        }
        
        @keyframes bounceRecord {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-4px) scale(1.05); }
        }
        
        /* Restart action button */
        .btn-restart {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border: none;
            color: #ffffff;
            font-family: var(--font-main);
            font-weight: 800;
            font-size: 0.95rem;
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            box-shadow: 0 8px 16px rgba(255, 0, 85, 0.3), 0 0 10px rgba(139, 92, 246, 0.15);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(255, 0, 85, 0.45), 0 0 20px rgba(139, 92, 246, 0.35);
            filter: brightness(1.08);
        }

        .btn-restart:active {
            transform: translateY(1px);
        }
        
        /* Game HUD Floating Counter */
        .hud-score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-game);
            font-size: 2.2rem;
            color: #ffffff;
            text-shadow: 
                0 0 6px rgba(0, 0, 0, 0.9),
                0 0 15px rgba(139, 92, 246, 0.7);
            z-index: 5;
            transition: all 0.08s ease;
        }

        .hud-score.grow {
            transform: translateX(-50%) scale(1.18);
            color: var(--secondary);
            text-shadow: 
                0 0 6px rgba(0, 0, 0, 0.9),
                0 0 20px var(--secondary);
        }
        
        /* Footer descriptions */
        .arcade-footer {
            margin-top: 12px;
            font-size: 0.72rem;
            color: rgba(255, 255, 255, 0.35);
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .arcade-footer span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .arcade-footer i {
            color: var(--accent);
        }

        /* Screen sizing constraints to guarantee perfect mobile rendering */
        @media (max-height: 720px) {
            .arcade-container {
                padding: 10px;
            }
            .canvas-wrapper {
                max-height: calc(100vh - 140px);
            }
            .arcade-header {
                margin-bottom: 8px;
            }
            .logo-container {
                margin-bottom: 20px;
            }
            .logo-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Main arcade frame -->
    <div class="arcade-container">
        <!-- Dashboard bar -->
        <div class="arcade-header">
            <h1 class="arcade-title">
                <i class="fa-solid fa-gamepad"></i> Alpha Flap
            </h1>
            <button class="sound-btn" id="soundBtn" title="Suara Mute/Unmute">
                <i class="fa-solid fa-volume-high"></i>
            </button>
        </div>

        <!-- Canvas and screens viewport -->
        <div class="canvas-wrapper">
            <!-- Score Counter HUD -->
            <div class="hud-score hidden" id="hudScore">0</div>

            <!-- Start Game UI Overlay -->
            <div class="overlay start-screen" id="startScreen">
                <div class="logo-container">
                    <h2 class="logo-title">ALPHA<br>FLAP</h2>
                    <p class="logo-subtitle">Cyberpunk Arcade</p>
                </div>
                
                <div class="instruction-card">
                    <p class="tap-prompt">SENTUH LAYAR ATAU TEKAN SPASI UNTUK MELOMPAT</p>
                    <div class="control-badges">
                        <span class="control-badge"><i class="fa-regular fa-keyboard"></i> SPASI</span>
                        <span class="control-badge"><i class="fa-solid fa-hand-pointer"></i> SENTUH</span>
                    </div>
                </div>

                <div class="high-score-banner">
                    <i class="fa-solid fa-trophy" style="color: #ffd700;"></i> Skor Terbaik: <span id="startBestScore">0</span>
                </div>
            </div>

            <!-- Game Over UI Overlay -->
            <div class="overlay game-over-screen hidden" id="gameOverScreen">
                <div class="game-over-card">
                    <h2 class="game-over-title">GAME OVER</h2>
                    
                    <div class="score-board">
                        <div class="new-record-badge" id="newRecordBadge">Rekor Baru!</div>
                        
                        <div class="score-row">
                            <span class="score-label">Skor</span>
                            <span class="score-val" id="finalScore">0</span>
                        </div>
                        
                        <div class="score-row">
                            <span class="score-label">Terbaik</span>
                            <span class="score-val highlight" id="bestScore">0</span>
                        </div>
                        
                        <div class="medal-container">
                            <span class="score-label">Medali</span>
                            <div class="medal-badge-box">
                                <span class="medal-badge-name" id="medalName">-</span>
                                <div class="medal-img medal-none" id="medalBadge">
                                    <i class="fa-solid fa-medal"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <button class="btn-restart" id="restartBtn">
                        <i class="fa-solid fa-rotate-right"></i> Main Lagi
                    </button>
                </div>
            </div>

            <!-- Drawing area -->
            <canvas id="gameCanvas" width="400" height="600"></canvas>
        </div>

        <!-- Details label footer -->
        <div class="arcade-footer">
            <span><i class="fa-solid fa-bolt"></i> Paralaks</span>
            <span><i class="fa-solid fa-wave-square"></i> Synth SFX</span>
        </div>
    </div>

    <!-- Gameplay Script -->
    <script>
        // --- Retro Audio Synthesizer Class (Web Audio API) ---
        class SoundEffects {
            constructor() {
                this.ctx = null;
                // Retrieve initial mute settings
                this.muted = localStorage.getItem('neonflap_muted') === 'true';
            }
            
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }
            
            toggleMute() {
                this.muted = !this.muted;
                localStorage.setItem('neonflap_muted', this.muted);
                return this.muted;
            }
            
            playJump() {
                if (this.muted) return;
                this.init();
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(340, t);
                osc.frequency.exponentialRampToValueAtTime(750, t + 0.08);
                
                gain.gain.setValueAtTime(0.12, t);
                gain.gain.linearRampToValueAtTime(0.01, t + 0.08);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start(t);
                osc.stop(t + 0.08);
            }
            
            playScore() {
                if (this.muted) return;
                this.init();
                const t = this.ctx.currentTime;
                
                // Arpeggio chime notes
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'square';
                
                osc.frequency.setValueAtTime(523.25, t); // C5
                osc.frequency.setValueAtTime(659.25, t + 0.07); // E5
                
                gain.gain.setValueAtTime(0.08, t);
                gain.gain.setValueAtTime(0.08, t + 0.07);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start(t);
                osc.stop(t + 0.22);
            }
            
            playCrash() {
                if (this.muted) return;
                this.init();
                const t = this.ctx.currentTime;
                const duration = 0.45;
                
                // Construct white noise buffer for explosion rumble
                const bufferSize = this.ctx.sampleRate * duration;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                
                const noiseSource = this.ctx.createBufferSource();
                noiseSource.buffer = buffer;
                
                const lowpass = this.ctx.createBiquadFilter();
                lowpass.type = 'lowpass';
                lowpass.frequency.setValueAtTime(900, t);
                lowpass.frequency.exponentialRampToValueAtTime(10, t + duration);
                
                const noiseGain = this.ctx.createGain();
                noiseGain.gain.setValueAtTime(0.25, t);
                noiseGain.gain.linearRampToValueAtTime(0.01, t + duration);
                
                noiseSource.connect(lowpass);
                lowpass.connect(noiseGain);
                noiseGain.connect(this.ctx.destination);
                
                noiseSource.start(t);
                noiseSource.stop(t + duration);
                
                // Deep low pitch sweep to add heavy impact base
                const subOsc = this.ctx.createOscillator();
                const subGain = this.ctx.createGain();
                subOsc.type = 'sawtooth';
                subOsc.frequency.setValueAtTime(180, t);
                subOsc.frequency.linearRampToValueAtTime(30, t + duration);
                
                subGain.gain.setValueAtTime(0.18, t);
                subGain.gain.linearRampToValueAtTime(0.01, t + duration);
                
                subOsc.connect(subGain);
                subGain.connect(this.ctx.destination);
                
                subOsc.start(t);
                subOsc.stop(t + duration);
            }
            
            playSelect() {
                if (this.muted) return;
                this.init();
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(450, t);
                osc.frequency.linearRampToValueAtTime(250, t + 0.05);
                
                gain.gain.setValueAtTime(0.12, t);
                gain.gain.linearRampToValueAtTime(0.01, t + 0.05);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start(t);
                osc.stop(t + 0.05);
            }
        }

        // --- Sparkle & Trail Particles ---
        class Particle {
            constructor(x, y, vx, vy, color, size, decay, gravity = 0) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.size = size;
                this.alpha = 1;
                this.decay = decay;
                this.gravity = gravity;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.alpha -= this.decay;
            }
            
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.fillStyle = this.color;
                
                // Add soft neon bloom effect on particles
                ctx.shadowBlur = 6;
                ctx.shadowColor = this.color;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            
            isDead() {
                return this.alpha <= 0;
            }
        }

        // --- Parallax Bkg blinking stars ---
        class Star {
            constructor(width, height) {
                this.width = width;
                this.x = Math.random() * width;
                this.y = Math.random() * (height * 0.65);
                this.size = Math.random() * 2 + 0.5;
                this.alpha = Math.random() * 0.6 + 0.2;
                this.pulseSpeed = Math.random() * 0.04 + 0.02;
                this.pulseTime = Math.random() * 100;
                this.scrollSpeed = Math.random() * 0.03 + 0.01;
            }
            
            update() {
                this.x -= this.scrollSpeed;
                if (this.x < 0) this.x = this.width;
                this.pulseTime += this.pulseSpeed;
            }
            
            draw(ctx) {
                const currentAlpha = this.alpha + Math.sin(this.pulseTime) * 0.15;
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0.1, Math.min(1, currentAlpha))})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // --- Procedural Parallax Cityscape Buildings ---
        class Cityscape {
            constructor(canvasWidth, canvasHeight, speed, color, baseHeight, variation) {
                this.canvasWidth = canvasWidth;
                this.canvasHeight = canvasHeight;
                this.speed = speed;
                this.color = color;
                this.buildings = [];
                this.baseHeight = baseHeight;
                this.variation = variation;
                
                // Pre-populate skyline across canvas width
                let x = 0;
                while (x < canvasWidth + 100) {
                    const b = this.createBuilding(x);
                    this.buildings.push(b);
                    x += b.width;
                }
            }
            
            createBuilding(x) {
                const bWidth = Math.random() * 45 + 35;
                const bHeight = this.baseHeight + Math.random() * this.variation;
                
                // Pre-calculate window locations to avoid random window flashes during draw
                const windows = [];
                const rows = Math.floor(bHeight / 16) - 1;
                const cols = Math.floor(bWidth / 12) - 1;
                
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (Math.random() > 0.45) { // 55% chance window is lit
                            windows.push({
                                dx: c * 12 + 8,
                                dy: r * 16 + 12,
                                color: Math.random() > 0.6 ? 'rgba(0, 255, 204, 0.22)' : 'rgba(255, 180, 50, 0.22)'
                            });
                        }
                    }
                }
                
                return { x, width: bWidth, height: bHeight, windows };
            }
            
            update() {
                for (let b of this.buildings) {
                    b.x -= this.speed;
                }
                
                // Wrap buildings around
                if (this.buildings.length > 0 && this.buildings[0].x + this.buildings[0].width < 0) {
                    const removed = this.buildings.shift();
                    const last = this.buildings[this.buildings.length - 1];
                    const nextBuilding = this.createBuilding(last.x + last.width);
                    this.buildings.push(nextBuilding);
                }
            }
            
            draw(ctx) {
                ctx.save();
                for (let b of this.buildings) {
                    // Draw main pillar
                    ctx.fillStyle = this.color;
                    ctx.fillRect(b.x, this.canvasHeight - 80 - b.height, b.width, b.height);
                    
                    // Top architectural accent line (neon light reflection)
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(b.x, this.canvasHeight - 80 - b.height, b.width, b.height);
                    
                    // Draw predefined windows inside building
                    for (let w of b.windows) {
                        ctx.fillStyle = w.color;
                        ctx.fillRect(b.x + w.dx, this.canvasHeight - 80 - b.height + w.dy, 4, 6);
                    }
                }
                ctx.restore();
            }
        }

        // --- Flappy Bird Hero ---
        class Bird {
            constructor(canvasWidth, canvasHeight) {
                this.canvasWidth = canvasWidth;
                this.canvasHeight = canvasHeight;
                this.x = canvasWidth * 0.25;
                this.y = canvasHeight * 0.45;
                this.radius = 16;
                this.vy = 0;
                this.gravity = 0.08;
                this.jumpImpulse = -2.7;
                this.rotation = 0;
                this.flapFrame = 0;
                this.flapSpeed = 0.15;
            }
            
            jump() {
                this.vy = this.jumpImpulse;
            }
            
            update(groundY) {
                this.vy += this.gravity;
                if (this.vy > 2.6) this.vy = 2.6; // Cap downward speed
                
                this.y += this.vy;
                
                // Rotation angle calculations base on velocity
                if (this.vy < 0) {
                    // Quick tilt upwards when jumping
                    this.rotation = Math.max(-0.4, this.vy * 0.08);
                } else {
                    // Gentle dive down when falling
                    this.rotation = Math.min(0.75, this.rotation + 0.045);
                }
                
                // Wing flapping animation speed
                this.flapFrame += this.flapSpeed;
                
                // Ground collision bounding
                if (this.y + this.radius > groundY) {
                    this.y = groundY - this.radius;
                    this.vy = 0;
                }
                
                // Ceil bounding (stops bird from flying high out of view)
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.vy = 0.15;
                }
            }
            
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // Outer body glow
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#ff0055';
                
                // Bird body core - Glowing pink/magenta radial gradient
                let bodyGrad = ctx.createRadialGradient(-3, -3, 2, 0, 0, this.radius);
                bodyGrad.addColorStop(0, '#ff66aa');
                bodyGrad.addColorStop(0.55, '#ff0055');
                bodyGrad.addColorStop(1, '#a60033');
                ctx.fillStyle = bodyGrad;
                
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // Glowing border
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1.8;
                ctx.stroke();
                
                // Disable glowing shadow for details to keep lines clean
                ctx.shadowBlur = 0;
                
                // Eye details (big cartoon eyes)
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(this.radius * 0.35, -this.radius * 0.22, 5.5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(this.radius * 0.45, -this.radius * 0.22, 2.8, 0, Math.PI * 2);
                ctx.fill();
                
                // Reflection highlight dot
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(this.radius * 0.5, -this.radius * 0.28, 1, 0, Math.PI * 2);
                ctx.fill();
                
                // Cute Neon Orange Beak
                let beakGrad = ctx.createLinearGradient(this.radius * 0.6, -2, this.radius * 1.2, 2);
                beakGrad.addColorStop(0, '#ffae19');
                beakGrad.addColorStop(1, '#ff3b00');
                ctx.fillStyle = beakGrad;
                ctx.beginPath();
                ctx.moveTo(this.radius * 0.65, -this.radius * 0.2);
                ctx.lineTo(this.radius * 1.25, 0);
                ctx.lineTo(this.radius * 0.65, this.radius * 0.28);
                ctx.closePath();
                ctx.fill();
                
                // Animated cyber cyan Wing
                ctx.save();
                ctx.translate(-this.radius * 0.3, 0);
                
                // Tilt wing angle over time to flap
                const wingFlapRotation = Math.sin(this.flapFrame) * 0.55;
                ctx.rotate(wingFlapRotation);
                
                let wingGrad = ctx.createLinearGradient(-9, -5, 5, 5);
                wingGrad.addColorStop(0, '#00ffff');
                wingGrad.addColorStop(1, '#007acc');
                ctx.fillStyle = wingGrad;
                
                ctx.beginPath();
                ctx.ellipse(-2, 0, 10, 6, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1;
                ctx.stroke();
                
                ctx.restore();
                ctx.restore();
            }
        }

        // --- Gapped Green Neon Pipes ---
        class Pipe {
            constructor(canvasWidth, canvasHeight, speed, gapHeight) {
                this.canvasWidth = canvasWidth;
                this.canvasHeight = canvasHeight;
                this.x = canvasWidth;
                this.width = 66;
                this.speed = speed;
                this.passed = false;
                
                const groundHeight = 80;
                const playHeight = canvasHeight - groundHeight;
                const minHeight = 60;
                const maxHeight = playHeight - gapHeight - minHeight;
                
                // Randomize vertical positions of the opening gap
                this.topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
                this.bottomY = this.topHeight + gapHeight;
                this.bottomHeight = playHeight - this.bottomY;
            }
            
            update() {
                this.x -= this.speed;
            }
            
            isOffscreen() {
                return this.x + this.width < 0;
            }
            
            draw(ctx) {
                // Top obstacle segment
                this.drawPipeSegment(ctx, this.x, 0, this.width, this.topHeight, true);
                // Bottom obstacle segment
                this.drawPipeSegment(ctx, this.x, this.bottomY, this.width, this.bottomHeight, false);
            }
            
            drawPipeSegment(ctx, x, y, w, h, isTop) {
                ctx.save();
                
                // Emerald/Lime green gradient filling
                let grad = ctx.createLinearGradient(x, 0, x + w, 0);
                grad.addColorStop(0, '#027a35');
                grad.addColorStop(0.2, '#00ff66');
                grad.addColorStop(0.5, '#56ffaa');
                grad.addColorStop(0.8, '#00cc55');
                grad.addColorStop(1, '#014f22');
                
                ctx.fillStyle = grad;
                ctx.fillRect(x, y, w, h);
                
                // Neon glowing pipeline border
                ctx.strokeStyle = '#00ffaa';
                ctx.lineWidth = 2.5;
                ctx.strokeRect(x, y, w, h);
                
                // Draw decorative lips (rim caps) on the gap ends
                const rimHeight = 25;
                const rimOffset = 4;
                let rimY = isTop ? (y + h - rimHeight) : y;
                
                let rimGrad = ctx.createLinearGradient(x - rimOffset, 0, x + w + rimOffset, 0);
                rimGrad.addColorStop(0, '#028a3c');
                rimGrad.addColorStop(0.2, '#00ff88');
                rimGrad.addColorStop(0.5, '#a3ffdd');
                rimGrad.addColorStop(0.8, '#00dd66');
                rimGrad.addColorStop(1, '#01662c');
                
                ctx.fillStyle = rimGrad;
                ctx.fillRect(x - rimOffset, rimY, w + rimOffset * 2, rimHeight);
                ctx.strokeRect(x - rimOffset, rimY, w + rimOffset * 2, rimHeight);
                
                // Add vertical overlay sheen panels for 3D metallic tube feeling
                ctx.fillStyle = 'rgba(255, 255, 255, 0.18)';
                ctx.fillRect(x + 5, y, 4, h);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.22)';
                ctx.fillRect(x + w - 9, y, 4, h);
                
                ctx.restore();
            }
            
            collidesWith(bird) {
                // Adjust hitbox slightly inward (padding) to optimize play feel (fair box)
                const padding = 3;
                const bx = bird.x;
                const by = bird.y;
                const br = bird.radius - padding;
                
                // AABB vs circle-bounding approximation overlap check
                if (bx + br > this.x && bx - br < this.x + this.width) {
                    // Check upper pipe intersect
                    if (by - br < this.topHeight) return true;
                    // Check lower pipe intersect
                    if (by + br > this.bottomY) return true;
                }
                return false;
            }
        }

        // --- Core Engine & Game Controller ---
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.sound = new SoundEffects();
                
                this.state = 'START'; // START, PLAYING, GAMEOVER
                this.score = 0;
                this.highScore = parseInt(localStorage.getItem('neonflap_highscore')) || 0;
                
                this.baseSpeed = 2.1;
                this.speed = this.baseSpeed;
                
                this.bird = null;
                this.pipes = [];
                this.particles = [];
                this.stars = [];
                this.cityLayers = [];
                
                this.pipeSpawnTimer = 0;
                this.pipeSpacing = 285; // Distance between subsequent pipes in pixels
                
                this.shakeDuration = 0;
                this.shakeIntensity = 0;
                this.hoverTime = 0;
                this.groundOffset = 0;
                
                // Load DOM Reference pointers
                this.hudScore = document.getElementById('hudScore');
                this.startScreen = document.getElementById('startScreen');
                this.gameOverScreen = document.getElementById('gameOverScreen');
                this.finalScoreText = document.getElementById('finalScore');
                this.bestScoreText = document.getElementById('bestScore');
                this.startBestScoreText = document.getElementById('startBestScore');
                this.newRecordBadge = document.getElementById('newRecordBadge');
                this.medalBadge = document.getElementById('medalBadge');
                this.medalName = document.getElementById('medalName');
                this.restartBtn = document.getElementById('restartBtn');
                this.soundBtn = document.getElementById('soundBtn');
                
                // Setup and initialize high scores displays
                this.startBestScoreText.textContent = this.highScore;
                this.updateSoundButtonUI();
                
                // Trigger event setups
                this.bindEvents();
                this.initEntities();
            }
            
            initEntities() {
                this.score = 0;
                this.speed = this.baseSpeed;
                this.pipeSpawnTimer = this.pipeSpacing; // Force pipe to spawn immediately on start
                this.pipes = [];
                this.particles = [];
                
                this.bird = new Bird(this.canvas.width, this.canvas.height);
                
                // Rebuild starry backdrop (40 stars)
                this.stars = [];
                for (let i = 0; i < 40; i++) {
                    this.stars.push(new Star(this.canvas.width, this.canvas.height));
                }
                
                // Build cityscape background structures (parallax layers)
                this.cityLayers = [
                    new Cityscape(this.canvas.width, this.canvas.height, 0.08, '#100e26', 100, 60), // Far
                    new Cityscape(this.canvas.width, this.canvas.height, 0.22, '#181335', 140, 80)  // Near
                ];
            }
            
            bindEvents() {
                // Key and click controllers
                window.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        this.handleAction();
                    }
                });
                
                // Mouse/Touch triggers for canvas wrapper
                this.canvas.parentElement.addEventListener('mousedown', (e) => {
                    // Prevent triggering double jump when clicking buttons
                    if (e.target.closest('button') || e.target.closest('.game-over-card')) return;
                    e.preventDefault();
                    this.handleAction();
                });
                
                this.canvas.parentElement.addEventListener('touchstart', (e) => {
                    if (e.target.closest('button') || e.target.closest('.game-over-card')) return;
                    e.preventDefault();
                    this.handleAction();
                }, { passive: false });
                
                // Restart button click event
                this.restartBtn.addEventListener('click', () => {
                    this.sound.playSelect();
                    this.restart();
                });
                
                // Sound switch click event
                this.soundBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isMuted = this.sound.toggleMute();
                    this.updateSoundButtonUI();
                    if (!isMuted) {
                        this.sound.playSelect();
                    }
                });
            }
            
            updateSoundButtonUI() {
                const icon = this.soundBtn.querySelector('i');
                if (this.sound.muted) {
                    icon.className = 'fa-solid fa-volume-xmark';
                    this.soundBtn.style.borderColor = 'rgba(255, 0, 85, 0.4)';
                    this.soundBtn.style.color = 'var(--primary)';
                } else {
                    icon.className = 'fa-solid fa-volume-high';
                    this.soundBtn.style.borderColor = 'rgba(255,255,255,0.08)';
                    this.soundBtn.style.color = '#ffffff';
                }
            }
            
            handleAction() {
                if (this.state === 'START') {
                    // Transition to game start
                    this.state = 'PLAYING';
                    this.startScreen.classList.add('hidden');
                    this.hudScore.classList.remove('hidden');
                    this.hudScore.textContent = '0';
                    
                    this.sound.init(); // Initialize audio context on player gesture
                    this.bird.jump();
                    this.sound.playJump();
                    this.spawnJumpParticles();
                } else if (this.state === 'PLAYING') {
                    this.bird.jump();
                    this.sound.playJump();
                    this.spawnJumpParticles();
                }
            }
            
            spawnJumpParticles() {
                // Generate light sparkles on flaps
                for (let i = 0; i < 3; i++) {
                    this.particles.push(new Particle(
                        this.bird.x - this.bird.radius,
                        this.bird.y + (Math.random() * 10 - 5),
                        -1.2 - Math.random() * 1.5, // fly backward
                        (Math.random() * 2 - 1),
                        'rgba(0, 255, 204, 0.75)',
                        Math.random() * 2.5 + 1.2,
                        0.02 + Math.random() * 0.015,
                        0.04 // fall slowly
                    ));
                }
            }
            
            triggerScreenShake(duration, intensity) {
                this.shakeDuration = duration;
                this.shakeIntensity = intensity;
            }
            
            gameOver() {
                this.state = 'GAMEOVER';
                this.sound.playCrash();
                this.triggerScreenShake(26, 7);
                
                // Spawn massive explosions particle count
                for (let i = 0; i < 35; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 5.5 + 2;
                    const size = Math.random() * 4.5 + 1.5;
                    const colors = ['#ff0055', '#ffaa00', '#00ffcc', '#ffffff', '#a855f7'];
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    
                    this.particles.push(new Particle(
                        this.bird.x,
                        this.bird.y,
                        Math.cos(angle) * speed,
                        Math.sin(angle) * speed,
                        color,
                        size,
                        0.012 + Math.random() * 0.012,
                        0.14 // gravity pulling them down
                    ));
                }
                
                // High Score Logic Checks
                let isNewRecord = false;
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('neonflap_highscore', this.highScore);
                    isNewRecord = true;
                }
                
                // Set Up Overlay text
                this.finalScoreText.textContent = this.score;
                this.bestScoreText.textContent = this.highScore;
                this.startBestScoreText.textContent = this.highScore;
                
                if (isNewRecord && this.score > 0) {
                    this.newRecordBadge.style.display = 'block';
                } else {
                    this.newRecordBadge.style.display = 'none';
                }
                
                // Determine Medals category
                let medalClass = 'medal-none';
                let medalNameText = 'KOSONG';
                if (this.score >= 40) {
                    medalClass = 'medal-platinum';
                    medalNameText = 'PLATINUM';
                } else if (this.score >= 25) {
                    medalClass = 'medal-gold';
                    medalNameText = 'EMAS';
                } else if (this.score >= 12) {
                    medalClass = 'medal-silver';
                    medalNameText = 'PERAK';
                } else if (this.score >= 4) {
                    medalClass = 'medal-bronze';
                    medalNameText = 'PERUNGGU';
                }
                
                this.medalBadge.className = `medal-img ${medalClass}`;
                this.medalName.textContent = medalNameText;
                this.medalName.style.color = 
                    medalClass === 'medal-platinum' ? '#e5e9f0' :
                    medalClass === 'medal-gold' ? '#ffe066' :
                    medalClass === 'medal-silver' ? '#dee2e6' :
                    medalClass === 'medal-bronze' ? '#f76707' : 'rgba(255,255,255,0.3)';
                
                // Display Game Over Interface
                setTimeout(() => {
                    this.hudScore.classList.add('hidden');
                    this.gameOverScreen.classList.remove('hidden');
                }, 400);
            }
            
            restart() {
                this.gameOverScreen.classList.add('hidden');
                this.initEntities();
                this.state = 'START';
                this.startScreen.classList.remove('hidden');
                this.hudScore.classList.add('hidden');
            }
            
            update() {
                // Always update background entities (stars parallax continues)
                for (let star of this.stars) {
                    star.update();
                }
                
                if (this.state === 'START') {
                    // Start screen ambient hover movement
                    for (let layer of this.cityLayers) {
                        layer.update();
                    }
                    this.groundOffset = (this.groundOffset - this.speed) % 40;
                    
                    this.hoverTime += 0.055;
                    this.bird.y = 270 + Math.sin(this.hoverTime) * 11;
                    this.bird.rotation = Math.sin(this.hoverTime) * 0.12;
                    this.bird.flapFrame += this.bird.flapSpeed;
                } 
                else if (this.state === 'PLAYING') {
                    // Update parallax city structures
                    for (let layer of this.cityLayers) {
                        layer.update();
                    }
                    
                    // Update scrolling ground
                    this.groundOffset = (this.groundOffset - this.speed) % 40;
                    
                    // Update player bird
                    const groundY = this.canvas.height - 80;
                    this.bird.update(groundY);
                    
                    // Ground impact triggers gameover
                    if (this.bird.y + this.bird.radius >= groundY) {
                        this.gameOver();
                        return;
                    }
                    
                    // Update obstacles pipelines
                    this.pipeSpawnTimer += this.speed;
                    if (this.pipeSpawnTimer >= this.pipeSpacing) {
                        // Dynamic gap narrowing base on scores to increase difficulty
                        const currentGapHeight = Math.max(120, 142 - Math.floor(this.score / 6) * 3);
                        this.pipes.push(new Pipe(this.canvas.width, this.canvas.height, this.speed, currentGapHeight));
                        this.pipeSpawnTimer = 0;
                    }
                    
                    for (let i = this.pipes.length - 1; i >= 0; i--) {
                        const pipe = this.pipes[i];
                        pipe.speed = this.speed; // Sync existing pipes to current game speed
                        pipe.update();
                        
                        // Scoring cross checks
                        if (!pipe.passed && this.bird.x > pipe.x + pipe.width) {
                            pipe.passed = true;
                            this.score++;
                            this.sound.playScore();
                            
                            // Visual chime bump effect on HUD text
                            this.hudScore.textContent = this.score;
                            this.hudScore.classList.add('grow');
                            setTimeout(() => this.hudScore.classList.remove('grow'), 80);
                            
                            // Gradually increase game speed to ramp difficulty
                            this.speed = Math.min(4.5, this.baseSpeed + (this.score * 0.055));
                        }
                        
                        // Collision checks
                        if (pipe.collidesWith(this.bird)) {
                            this.gameOver();
                            return;
                        }
                        
                        // Purge offscreen pipes
                        if (pipe.isOffscreen()) {
                            this.pipes.splice(i, 1);
                        }
                    }
                } 
                else if (this.state === 'GAMEOVER') {
                    // In game over, bird still falls down to ground due to gravity
                    const groundY = this.canvas.height - 80;
                    if (this.bird.y + this.bird.radius < groundY) {
                        this.bird.update(groundY);
                    }
                }
                
                // Update active particles list
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.update();
                    if (p.isDead()) {
                        this.particles.splice(i, 1);
                    }
                }
            }
            
            draw() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.save();
                
                // Handle camera screen shake translation
                if (this.shakeDuration > 0) {
                    const dx = (Math.random() - 0.5) * this.shakeIntensity;
                    const dy = (Math.random() - 0.5) * this.shakeIntensity;
                    this.ctx.translate(dx, dy);
                    this.shakeDuration--;
                }
                
                // 1. Draw Linear Sky Gradient
                let skyGrad = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
                skyGrad.addColorStop(0, '#06050e');
                skyGrad.addColorStop(0.4, '#0d0a21');
                skyGrad.addColorStop(0.85, '#1e1438');
                skyGrad.addColorStop(1, '#2c1945');
                this.ctx.fillStyle = skyGrad;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 2. Draw Twinkling Stars
                for (let star of this.stars) {
                    star.draw(this.ctx);
                }
                
                // 3. Draw Parallax City structures
                for (let layer of this.cityLayers) {
                    layer.draw(this.ctx);
                }
                
                // 4. Draw Obstacles Pipes
                for (let pipe of this.pipes) {
                    pipe.draw(this.ctx);
                }
                
                // 5. Draw Cyber Grid Ground
                const groundY = this.canvas.height - 80;
                
                // Ground fill
                this.ctx.fillStyle = '#0a081a';
                this.ctx.fillRect(0, groundY, this.canvas.width, 80);
                
                // Horizontal perspective lines
                this.ctx.strokeStyle = 'rgba(139, 92, 246, 0.25)';
                this.ctx.lineWidth = 1;
                const perspectiveLines = [0, 8, 18, 32, 50, 68, 80];
                for (let dy of perspectiveLines) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, groundY + dy);
                    this.ctx.lineTo(this.canvas.width, groundY + dy);
                    this.ctx.stroke();
                }
                
                // Scrolling vertical grid perspective lines
                this.ctx.strokeStyle = 'rgba(0, 255, 204, 0.3)';
                this.ctx.lineWidth = 1.5;
                const spacing = 40;
                const offset = this.groundOffset;
                for (let x = -spacing; x < this.canvas.width + spacing; x += spacing) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x + offset, groundY);
                    // Fan out lines downward to achieve retro 3D horizon grid feeling
                    const deltaX = (x + offset - this.canvas.width / 2) * 0.45;
                    this.ctx.lineTo(x + offset + deltaX, this.canvas.height);
                    this.ctx.stroke();
                }
                
                // Top border neon glow line separation
                this.ctx.strokeStyle = '#00ffcc';
                this.ctx.lineWidth = 4;
                this.ctx.shadowBlur = 10;
                this.ctx.shadowColor = '#00ffcc';
                this.ctx.beginPath();
                this.ctx.moveTo(0, groundY);
                this.ctx.lineTo(this.canvas.width, groundY);
                this.ctx.stroke();
                
                // Reset shadows for next drawings
                this.ctx.shadowBlur = 0;
                
                // 6. Draw particles
                for (let p of this.particles) {
                    p.draw(this.ctx);
                }
                
                // 7. Draw player Bird
                this.bird.draw(this.ctx);
                
                this.ctx.restore();
            }
            
            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
            
            start() {
                this.loop();
            }
        }

        // Initialize core orchestrator once content loads
        window.addEventListener('DOMContentLoaded', () => {
            const game = new Game();
            game.start();
        });
    </script>
</body>
</html>
